<!--
  Style: terminal — dark · monospace CLI · 冷调 phosphor · 工程严谨
  ─────────────────────────────────────────────────────────────────────
  歸藏家族 · Swiss 支柱（host class .pillar-swiss）。读 guizang-dna.md。
  family 里唯一的暗底成员——但它 mono-native、收得极紧、层级清晰，与歸藏
  Swiss 纪律同源（mono 标签 + 网格 + 负空间）。phosphor green 即本风格的
  accent（var(--accent)）；其余配色全冷调、preset 之外不另立。
  身份：暗底等宽 CLI，工程师的严谨感。不是玩具终端 —— 靠层级 + 网格 +
  负空间 + 一条 vim 式状态栏撑起「精密工程工具」的质感。配色全冷调、收得很紧。

  Tokens（全冷调，无暖色 —— 旧版 amber/magenta 已废弃）
    bg      #0a0e14   (深冷终端底)
    panel   #0d1219   (取景框内侧微提)
    ink     #e6edf3   (主文字)
    muted   #5c6b7a   (注释 / meta / 次要)
    faint   #2a333f   (发丝线 / 边框)
    green   #4ade80   (phosphor —— 主输出 / 数值 / prompt，带极淡辉光)
    teal    #5eead4   (青绿 —— 字符串 / 次高光)
    blue    #7aa2f7   (冷蓝 —— 键名 / 路径，demoted)
  Fonts
    mono (everything) — ui-monospace, "SF Mono", Menlo, monospace
    (Real JetBrains Mono would need a woff2 ship; mono fallback fine.)
  Signature moves
    - 取景框：1px 发丝冷边 + 标题嵌在上边线（cut-in titlebar）
    - 顶部 meta：INTERFLOW · TERMINAL / ● REC（phosphor 点）
    - phosphor green 带极淡 text-shadow 辉光（CRT 感，克制不刺眼）
    - 底部 vim 式状态栏：NORMAL / 路径 / utf-8 / 行列 —— meta chrome 兜底
    - prompt cursor 闪烁（纯 CSS）
  Best with
    layouts: split, pip
    frames:  hairline, clean
    content: 技术分析 / 代码片段 / 性能数据 / 工程思考
  Notes
    - "Blinking cursor" 必须是 CSS @keyframes，不能用 data-anim。单一视觉指示器
      的纯 CSS 动画是允许的。
    - 逐行揭示用 data-anim="fade-in" per line。
-->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>style · terminal</title>
<style>
  html, body { margin: 0; padding: 0; background: #06080c;
               font-family: ui-sans-serif, system-ui, sans-serif; }
  .stage { position: relative; width: 1920px; height: 1080px;
           transform-origin: top left; transform: scale(0.5); overflow: hidden; }
  .card-host { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; }
</style>
</head>
<body>
<div class="stage"><div class="card-host">

<div class="card" data-card-id="ref-terminal">
  <style>
    .card[data-card-id="ref-terminal"] .root {
      --bg: #0a0e14; --panel: #0d1219; --ink: #e6edf3;
      --muted: #5c6b7a; --faint: #2a333f;
      --green: #4ade80; --teal: #5eead4; --blue: #7aa2f7;
      --accent: #4ade80; --accent-on: #06120a;   /* phosphor green = family accent */
      --font-mono: ui-monospace, "SF Mono", "Menlo", "Courier New", monospace;

      width: 1920px; height: 1080px; position: relative; overflow: hidden;
      background:
        radial-gradient(120% 100% at 50% 0%, #0e141d 0%, var(--bg) 60%),
        var(--bg);
      color: var(--ink); box-sizing: border-box;
      font: 28px/1.55 var(--font-mono);
    }
    /* 取景框：发丝冷边 */
    .card[data-card-id="ref-terminal"] .frame {
      position: absolute; inset: 40px;
      border: 1px solid var(--faint); border-radius: 8px;
      background: linear-gradient(180deg, rgba(94,234,212,.015), transparent 30%);
      box-shadow: inset 0 1px 0 rgba(230,237,243,.04);
    }
    /* 标题嵌在上边线 */
    .card[data-card-id="ref-terminal"] .titlebar {
      position: absolute; left: 76px; top: 28px; padding: 0 14px;
      background: var(--bg);
      font: 600 17px/1 var(--font-mono); color: var(--muted);
      letter-spacing: .14em; display: flex; align-items: center; gap: 12px;
    }
    .card[data-card-id="ref-terminal"] .titlebar .gd {
      width: 9px; height: 9px; border-radius: 50%;
      border: 1px solid var(--faint);
    }
    /* 顶部 meta */
    .card[data-card-id="ref-terminal"] .meta {
      position: absolute; top: 78px; left: 96px; right: 96px;
      display: flex; justify-content: space-between; align-items: center;
      font: 600 18px/1 var(--font-mono); letter-spacing: .30em;
      text-transform: uppercase; color: var(--muted);
    }
    .card[data-card-id="ref-terminal"] .meta .rec { display: flex; align-items: center; gap: 12px; color: var(--green); }
    .card[data-card-id="ref-terminal"] .meta .rec .d { width: 10px; height: 10px; border-radius: 50%;
      background: var(--green); box-shadow: 0 0 12px var(--green), 0 0 4px #fff; }

    /* 内容主体 */
    .card[data-card-id="ref-terminal"] .content {
      position: absolute; left: 96px; right: 96px; top: 168px;
      display: flex; flex-direction: column;
    }
    .card[data-card-id="ref-terminal"] .kicker {
      color: var(--muted); font: 600 22px/1 var(--font-mono);
      letter-spacing: .12em; margin-bottom: 26px;
    }
    .card[data-card-id="ref-terminal"] .kicker .p { color: var(--green); }
    .card[data-card-id="ref-terminal"] .headline {
      font: 700 76px/1.14 var(--font-mono); color: var(--ink);
      letter-spacing: -.01em; margin: 0 0 40px; max-width: 1400px;
      overflow-wrap: anywhere;
    }
    .card[data-card-id="ref-terminal"] .headline .hl {
      color: var(--green); text-shadow: 0 0 26px rgba(74,222,128,.45);
    }
    .card[data-card-id="ref-terminal"] .headline .hl::before { content: "["; color: var(--faint); margin-right: 2px; }
    .card[data-card-id="ref-terminal"] .headline .hl::after  { content: "]"; color: var(--faint); margin-left: 2px; }

    .card[data-card-id="ref-terminal"] .lines { display: flex; flex-direction: column; gap: 16px; }
    .card[data-card-id="ref-terminal"] .line { font: 32px/1.5 var(--font-mono); }
    .card[data-card-id="ref-terminal"] .prompt { color: var(--green);
      text-shadow: 0 0 14px rgba(74,222,128,.35); }
    .card[data-card-id="ref-terminal"] .line .green  { color: var(--green); }
    .card[data-card-id="ref-terminal"] .line .teal   { color: var(--teal); }
    .card[data-card-id="ref-terminal"] .line .blue   { color: var(--blue); }
    .card[data-card-id="ref-terminal"] .line .muted  { color: var(--muted); }
    .card[data-card-id="ref-terminal"] .line .arrow  { color: var(--muted); }

    .card[data-card-id="ref-terminal"] .rule {
      height: 1px; width: 100%; margin: 38px 0 0;
      background: linear-gradient(90deg, var(--faint), transparent);
    }
    .card[data-card-id="ref-terminal"] .cursor {
      display: inline-block; width: 15px; height: 30px;
      background: var(--green); margin-left: 6px; vertical-align: -5px;
      box-shadow: 0 0 12px rgba(74,222,128,.5);
      animation: ref-term-blink 1.05s steps(1) infinite;
    }
    @keyframes ref-term-blink { 50% { opacity: 0; } }

    /* 底部 vim 式状态栏 */
    .card[data-card-id="ref-terminal"] .statusbar {
      position: absolute; left: 41px; right: 41px; bottom: 41px; height: 46px;
      border-bottom-left-radius: 7px; border-bottom-right-radius: 7px;
      display: flex; align-items: center; overflow: hidden;
      font: 600 17px/1 var(--font-mono); letter-spacing: .08em;
    }
    .card[data-card-id="ref-terminal"] .statusbar .seg {
      display: flex; align-items: center; height: 100%; padding: 0 20px;
      color: var(--muted);
    }
    .card[data-card-id="ref-terminal"] .statusbar .mode {
      background: var(--green); color: #06120a; font-weight: 700;
      letter-spacing: .18em;
    }
    .card[data-card-id="ref-terminal"] .statusbar .path { color: var(--ink); }
    .card[data-card-id="ref-terminal"] .statusbar .spacer { flex: 1; }
    .card[data-card-id="ref-terminal"] .statusbar .right { color: var(--teal); border-left: 1px solid var(--faint); }
  </style>

  <div class="root pillar-swiss">
    <div class="frame"></div>
    <span class="titlebar"><span class="gd"></span>~/takeaways/takeaway-007.md</span>

    <div class="meta">
      <span data-anim="fade-in" data-anim-at="0.10" data-anim-duration="0.5">INTERFLOW · TERMINAL</span>
      <span class="rec" data-anim="fade-in" data-anim-at="0.20" data-anim-duration="0.5"><span class="d"></span> REC · 16:9</span>
    </div>

    <div class="content">
      <div class="kicker" data-anim="fade-in" data-anim-at="0.30" data-anim-duration="0.4">
        <span class="p">$</span> cat takeaway.md
      </div>

      <h2 class="headline" data-anim="slide-in" data-anim-at="0.42" data-anim-duration="0.7"
          data-anim-from="bottom" data-anim-distance="32">
        缓存命中率提升到 <span class="hl">92%</span>
      </h2>

      <div class="lines">
        <div class="line" data-anim="fade-in" data-anim-at="0.70" data-anim-duration="0.35">
          <span class="prompt">$</span> bench --tier <span class="teal">"hot"</span> <span class="muted">--n 10k</span>
        </div>
        <div class="line" data-anim="fade-in" data-anim-at="0.92" data-anim-duration="0.35">
          <span class="arrow">→</span> <span class="blue">p50</span>=<span class="green">12ms</span>&nbsp;&nbsp;
          <span class="blue">p99</span>=<span class="green">38ms</span>&nbsp;&nbsp;
          <span class="blue">hit</span>=<span class="green">92.4%</span>
        </div>
        <div class="line" data-anim="fade-in" data-anim-at="1.14" data-anim-duration="0.35">
          <span class="muted">// before: hit=63%, p99=210ms</span>
        </div>
        <div class="line" data-anim="fade-in" data-anim-at="1.36" data-anim-duration="0.3">
          <span class="prompt">$</span><span class="cursor"></span>
        </div>
      </div>

      <div class="rule" data-anim="grow-x" data-anim-at="1.20" data-anim-duration="0.7" data-anim-target-w="1728"></div>
    </div>

    <div class="statusbar" data-anim="fade-in" data-anim-at="1.45" data-anim-duration="0.5">
      <span class="seg mode">NORMAL</span>
      <span class="seg path">main ✓</span>
      <span class="seg">takeaway.md</span>
      <span class="spacer"></span>
      <span class="seg">utf-8</span>
      <span class="seg">mono</span>
      <span class="seg right">12:1 · 100%</span>
    </div>
  </div>
</div>

</div></div>
</body>
</html>
