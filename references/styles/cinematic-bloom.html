<!--
  Style: cinematic-bloom (电影光影 · 宽银幕镜头光晕 · 真人窗口 + 光影在后)
  ═══════════════════════════════════════════════════════════════════════
  「炸裂族」之一，2026-06 从 playground 加固成生产级。定位：变形宽银幕 teal&orange
  电影调色 + 镜头光晕(anamorphic flare) + 散景虚化(bokeh) + bloom 泛光 + 上下黑边
  letterbox + 颗粒/暗角。最有大片质感，比霓虹更克制更暖。情绪/电影感开场收尾/品牌。

  ▌架构 = window-scene（与 neon-grid-hud 同一套，光影在人后永不糊脸）
    背景光影层（teal&orange 渐变 + keylight + bloom + bokeh + flare + glint + 暗角 + 颗粒 +
    letterbox）铺满 #stage 在最底 → 真人窗口 #video-wrap → 底部文案层(per-card)。
    **三态 videoBounds、满脸窗口铁律、垂直预算/不溢出铁律、9:16 首选 —— 全部沿用
    `neon-grid-hud.html` 头注释，不在此重复。** frame 恒 clean。

  ▌render-harden（从 playground 原稿改了什么 —— 见 playground-gallery/cinematic-bloom.html）
    原稿戏剧光全是 CSS @keyframes（keylight breathe / rimflick / bokeh float / flare sweep /
    glint / bloom / grainmove / flicker / 文案 rise）——**全保留**（CSS 动画 hyperframes 确定性捕获）。
    唯一非确定性：bokeh 光点用 `Math.random` 设位置/大小/时长。**改成 mulberry32 种子**
    （位置/大小/delay 全确定）。把原稿假「gradient 剪影」换成真 `#video-wrap` 窗口。

  ▌Composition-level 背景（贴进 #stage：把 playground 原稿 .video 区的光影层照搬，删掉 .silhouette，
    bokeh 注入脚本用种子版）
    ```js
    // 确定性 bokeh（替换原稿 Math.random 版）
    (function(){
      var wrap=document.getElementById('bokeh'); if(!wrap) return;
      function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
      var rnd=mulberry32(0xC1A4B07E);
      var cols=['rgba(120,220,255,.55)','rgba(255,160,80,.5)','rgba(90,200,230,.45)','rgba(255,190,120,.55)','rgba(160,235,255,.4)','rgba(255,130,60,.45)'];
      for(var i=0;i<22;i++){var d=document.createElement('div');d.className='b';var s=20+rnd()*150;
        d.style.cssText='width:'+s+'px;height:'+s+'px;left:'+(rnd()*100)+'%;top:'+(rnd()*100)+'%;opacity:'+(0.25+rnd()*0.5).toFixed(2)+
          ';background:radial-gradient(circle,'+cols[i%cols.length]+' 0%,rgba(0,0,0,0) 70%);animation-duration:'+(6+rnd()*10).toFixed(1)+'s;animation-delay:'+(-rnd()*10).toFixed(1)+'s';
        wrap.appendChild(d);}
    })();
    ```
    letterbox 黑边 + 暗角 + 颗粒照搬原稿 CSS。文案 rise 动画用原稿 CSS（确定性）或转 data-anim。

  ▌配色  teal&orange：暖橙 #ff7a3c / #ffb06a + 青 #7fd3e8 / #5ad2e6；标题暖白 #fdf3e8 渐变描金
  ▌字体  标题 'Helvetica Neue'/'PingFang SC' 800（暖白+橙青渐变 accent）；kicker/sub mono 斜体

  Best with: 情绪故事 / 电影感开场收尾 / 品牌片 / 暖调访谈。运镜偏固定/轻起伏，让光影慢慢呼吸。
  尾卡: card-cta 重新着色为 teal&orange，保留动画 rig。
-->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>style · cinematic-bloom (电影光影 · 真人窗口 + 光影在后)</title>
<style>
  html, body { margin:0; padding:0; background:#05080c; font-family:ui-sans-serif,system-ui,sans-serif; }
  .stage { position:relative; width:1080px; height:1920px; transform-origin:top left; transform:scale(0.42); overflow:hidden;
    background:
      radial-gradient(120% 90% at 68% 30%, rgba(255,150,70,.5) 0%, rgba(255,110,40,.16) 26%, transparent 55%),
      radial-gradient(140% 120% at 20% 80%, rgba(0,130,160,.6) 0%, rgba(0,60,90,.38) 40%, transparent 75%),
      linear-gradient(160deg,#0a1820 0%,#06121a 50%,#020608 100%); }
  .card-host { position:absolute; left:0; bottom:130px; width:1080px; padding:0 90px; }
</style>
</head>
<body>
<div class="stage"><div class="card-host">

<div class="card" data-card-id="ref-cinematic-bloom">
  <style>
    .card[data-card-id="ref-cinematic-bloom"] .root { container-type:inline-size; color:#fdf3e8;
      font-family:'Helvetica Neue','PingFang SC',sans-serif; text-align:left; }
    .card[data-card-id="ref-cinematic-bloom"] .kicker { display:inline-block; font-size:24px; letter-spacing:8px;
      text-transform:uppercase; color:#7fd3e8; font-weight:600; margin-bottom:18px; }
    .card[data-card-id="ref-cinematic-bloom"] .kicker::before { content:"●  "; color:#ff7a3c; }
    .card[data-card-id="ref-cinematic-bloom"] h1 { font-size:clamp(80px,11cqi,116px); line-height:.98; font-weight:800;
      letter-spacing:-2px; margin:0; color:#fdf3e8; overflow-wrap:anywhere; text-wrap:balance;
      text-shadow:0 4px 40px rgba(255,130,60,.35), 0 0 2px rgba(255,255,255,.4); }
    .card[data-card-id="ref-cinematic-bloom"] h1 .accent { background:linear-gradient(100deg,#ffb06a 0%,#ff7a3c 45%,#7fd3e8 110%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
      filter:drop-shadow(0 0 30px rgba(255,140,70,.4)); }
    .card[data-card-id="ref-cinematic-bloom"] .sub { font-size:34px; letter-spacing:6px; font-weight:300; font-style:italic;
      color:rgba(220,235,245,.7); margin:26px 0 0; text-transform:lowercase; }
    .card[data-card-id="ref-cinematic-bloom"] .rule { width:360px; height:2px; margin:34px 0 24px;
      background:linear-gradient(90deg,#ff7a3c,#7fd3e8,transparent); }
    .card[data-card-id="ref-cinematic-bloom"] .takeaway { font-size:clamp(30px,4.6cqi,40px); line-height:1.4; font-weight:400;
      color:rgba(232,242,248,.92); margin:30px 0 0; max-width:860px; }
    .card[data-card-id="ref-cinematic-bloom"] .takeaway .q { color:#7fd3e8; font-size:56px; vertical-align:-12px; margin-right:6px; }
  </style>
  <div class="root">
    <span class="kicker" data-anim="settle" data-anim-at="0.2" data-anim-duration="0.6">Interflow · 现场记录</span>
    <h1 data-anim="settle" data-anim-at="0.45" data-anim-duration="0.7">一场关于<br><span class="accent">AI 的真实对话</span></h1>
    <p class="sub" data-anim="fade-in" data-anim-at="0.7" data-anim-duration="0.6">an honest conversation about ai</p>
    <div class="rule" style="width:0" data-anim="grow-x" data-anim-at="0.95" data-anim-duration="0.7" data-anim-target-w="360"></div>
    <p class="takeaway" data-anim="settle" data-anim-at="1.1" data-anim-duration="0.6"><span class="q">"</span>真正的门槛不是技术，是你敢不敢把想法当真，今天就动手。</p>
  </div>
</div>

</div></div>
</body>
</html>
