<!--
  Style: holo-iridescent (全息虹彩 · 全息箔片色散 · 真人窗口 + 虹彩在后)
  ═══════════════════════════════════════════════════════════════════════
  「炸裂族」之一，2026-06 从 playground 加固成生产级。定位：全息箔片质感——缓慢旋转
  的 conic 虹彩光泽 + 棱镜光斑 + 玻璃卡虹彩描边 + 标题 RGB 色差叠影。最前卫、最「贵感」。
  产品揭晓 / 潮牌 / 前卫品牌。

  ▌架构 = window-scene（与 neon-grid-hud 同一套，特效在人后永不糊脸）
    背景虹彩层铺满 #stage 最底 → 真人窗口 #video-wrap（虹彩箔片描边）→ 玻璃卡内容层(per-card)。
    **三态 videoBounds（window→pip→fullscreen）、满脸窗口铁律、垂直预算/不溢出铁律、9:16 首选 ——
    全部沿用 `neon-grid-hud.html` 头注释，不在此重复。** 本文件只给本风格背景配方 + 内容层皮。frame 恒 clean。

  ▌render-harden（从 playground 原稿改了什么 —— 见 playground-gallery/holo-iridescent.html）
    **几乎全是 CSS @keyframes**（holo-sheet conic 旋转 / prism 飘浮 / 卡边 edgeFlow / 卡面 cardSweep /
    标题 RGB 色差 aberR/aberB / eyebrow textFlow）——CSS 动画被 hyperframes 的确定性时钟精确捕获，**保留**。
    唯一非确定性是原稿用 `Math.random()` + rAF 每 3 帧刷一次噪点 canvas → **删掉那段 JS，改成静态
    SVG fractalNoise 噪点 div**（`.grain` 用 data-uri SVG，固定不闪，渲染逐帧一致）。整个风格**不需要
    canvas 脚本**，背景层就是下面的 CSS。

  ▌Composition-level 背景（贴进 index.html 的 #stage 最底，纯 CSS，无脚本）
    ```html
    <div class="holo-sheet"></div><div class="holo-sheet b"></div>
    <div class="prism p1"></div><div class="prism p2"></div><div class="prism p3"></div>
    <div class="grain"></div><div class="vignette"></div>
    ```
    ```css
    #stage { background: radial-gradient(120% 80% at 50% -10%, #0c0a1c 0%, #060510 45%, #030308 100%); }
    .holo-sheet { position:absolute; inset:-30%; mix-blend-mode:screen; filter:blur(90px) saturate(160%); opacity:.38;
      background:conic-gradient(from 0deg at 35% 30%, #ff2d9b,#ff8a3d,#ffe14d,#4dff9e,#3da6ff,#9b5cff,#ff2d9b);
      animation:holoSpin 26s linear infinite; z-index:1; }
    .holo-sheet.b { opacity:.30; filter:blur(120px) saturate(150%); animation:holoSpin 34s linear infinite reverse;
      background:conic-gradient(from 180deg at 65% 70%, #4dffd4,#3da6ff,#9b5cff,#ff5ce0,#ffd34d,#4dffd4); }
    @keyframes holoSpin { to { transform:rotate(360deg); } }
    .prism { position:absolute; border-radius:50%; filter:blur(40px); mix-blend-mode:screen; opacity:.55; z-index:1; }
    .prism.p1 { width:420px;height:420px;top:6%;left:-8%; background:radial-gradient(circle,#ff4dc4 0%,transparent 70%); animation:holoFloatA 18s ease-in-out infinite; }
    .prism.p2 { width:360px;height:360px;bottom:14%;right:-6%; background:radial-gradient(circle,#3dd6ff 0%,transparent 70%); animation:holoFloatB 22s ease-in-out infinite; }
    .prism.p3 { width:300px;height:300px;top:44%;right:18%;opacity:.4; background:radial-gradient(circle,#ffe14d 0%,transparent 70%); animation:holoFloatA 26s ease-in-out infinite reverse; }
    @keyframes holoFloatA { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(60px,80px) scale(1.12)} }
    @keyframes holoFloatB { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-70px,-60px) scale(1.15)} }
    /* 静态 SVG 噪点（替换原稿 Math.random canvas，渲染确定性）*/
    .grain { position:absolute; inset:0; z-index:2; pointer-events:none; opacity:.10; mix-blend-mode:overlay;
      background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
    .vignette { position:absolute; inset:0; z-index:2; pointer-events:none;
      background:radial-gradient(120% 80% at 50% 38%, transparent 40%, rgba(2,4,12,.55) 100%); }
    ```
    真人窗口 #video-wrap 加全息箔片描边：`::before` conic-gradient + mask-composite:exclude + holoSpin 12s（见原稿 .speaker::before）。

  ▌配色  虹彩 conic: #ff2d9b #ff8a3d #ffe14d #4dff9e #3da6ff #9b5cff；标题白 #fdfdff + 红蓝色差叠影
  ▌字体  标题 'Songti SC'/'PingFang SC' serif 700；eyebrow/meta ui-monospace（渐变流光）

  Best with: 产品揭晓 / 前卫品牌 / 潮 / 想要最贵感的一两张高光卡。运镜建议轻起伏，让箔片慢慢转。
  尾卡: card-cta 重新着色为虹彩描边 + 标题色差，保留动画 rig。
-->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>style · holo-iridescent (全息虹彩 · 真人窗口 + 虹彩在后)</title>
<style>
  html, body { margin:0; padding:0; background:#04040a; font-family:ui-sans-serif,system-ui,sans-serif; }
  .stage { position:relative; width:1080px; height:1920px; transform-origin:top left; transform:scale(0.42);
           overflow:hidden;
           background:
             conic-gradient(from 20deg at 35% 32%, rgba(255,45,155,.22),rgba(255,225,77,.18),rgba(77,255,158,.18),rgba(61,166,255,.2),rgba(155,92,255,.22),rgba(255,45,155,.22)),
             radial-gradient(120% 80% at 50% -10%, #0c0a1c 0%, #060510 45%, #030308 100%); }
  .card-host { position:absolute; left:90px; top:1170px; width:900px; height:560px; }
</style>
</head>
<body>
<div class="stage"><div class="card-host">

<div class="card" data-card-id="ref-holo-iridescent">
  <style>
    .card[data-card-id="ref-holo-iridescent"] .root {
      --serif:'Songti SC','PingFang SC',serif; --mono:ui-monospace,'SF Mono',monospace;
      width:100%; height:100%; position:relative; overflow:hidden; box-sizing:border-box;
      border-radius:40px; padding:60px 56px 54px;
      background:rgba(20,18,40,0.35); -webkit-backdrop-filter:blur(30px) saturate(140%); backdrop-filter:blur(30px) saturate(140%);
      box-shadow:0 40px 120px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.10), inset 0 1px 0 rgba(255,255,255,0.25);
      display:flex; flex-direction:column; justify-content:center; color:#fff; container-type:inline-size;
    }
    /* 卡边缘虹彩描边 */
    .card[data-card-id="ref-holo-iridescent"] .root::before { content:''; position:absolute; inset:0; border-radius:40px; padding:1.5px;
      background:linear-gradient(135deg, rgba(255,80,200,.7),rgba(255,210,80,.4),rgba(80,255,180,.5),rgba(80,180,255,.7),rgba(160,90,255,.6));
      background-size:300% 300%; -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
      -webkit-mask-composite:xor; mask-composite:exclude; animation:holoEdge 8s ease infinite; pointer-events:none; }
    @keyframes holoEdge { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
    .card[data-card-id="ref-holo-iridescent"] .eyebrow { font-family:var(--mono); font-size:24px; letter-spacing:8px;
      text-transform:uppercase; margin:0 0 26px; background:linear-gradient(90deg,#ff5cd0,#6ad0ff,#b5ff7a); background-size:200% auto;
      -webkit-background-clip:text; background-clip:text; color:transparent; animation:holoTextFlow 5s linear infinite; }
    @keyframes holoTextFlow { to { background-position:200% center; } }
    .card[data-card-id="ref-holo-iridescent"] .title-wrap { position:relative; margin:0; }
    .card[data-card-id="ref-holo-iridescent"] .title { font-family:var(--serif); font-weight:700; font-size:clamp(64px,8.6cqi,92px);
      line-height:1.14; letter-spacing:1px; color:#fdfdff; position:relative; margin:0; overflow-wrap:anywhere; text-wrap:balance;
      text-shadow:0 2px 30px rgba(180,200,255,0.25); }
    .card[data-card-id="ref-holo-iridescent"] .title .ghost { position:absolute; top:0; left:0; width:100%; pointer-events:none;
      text-shadow:none; background:none; }
    .card[data-card-id="ref-holo-iridescent"] .title .ghost.r { color:#ff2d6a; mix-blend-mode:screen; animation:holoAberR 4.5s ease-in-out infinite; }
    .card[data-card-id="ref-holo-iridescent"] .title .ghost.b { color:#2d9bff; mix-blend-mode:screen; animation:holoAberB 4.5s ease-in-out infinite; }
    @keyframes holoAberR { 0%,100%{transform:translate(2.5px,-1.5px);opacity:.55} 50%{transform:translate(5px,1px);opacity:.8} }
    @keyframes holoAberB { 0%,100%{transform:translate(-2.5px,1.5px);opacity:.55} 50%{transform:translate(-5px,-1px);opacity:.8} }
    .card[data-card-id="ref-holo-iridescent"] .subtitle { font-family:var(--mono); font-size:30px; letter-spacing:5px;
      color:rgba(200,210,255,0.7); margin:28px 0 0; }
    .card[data-card-id="ref-holo-iridescent"] .byline { font-size:28px; letter-spacing:2px; color:rgba(255,255,255,0.55);
      margin:34px 0 0; display:flex; align-items:center; gap:14px; }
    .card[data-card-id="ref-holo-iridescent"] .byline .chip { background:linear-gradient(135deg,rgba(255,90,200,0.25),rgba(90,180,255,0.25));
      border:1px solid rgba(255,255,255,0.18); padding:6px 18px; border-radius:100px; font-size:24px; color:#fff; }
  </style>
  <div class="root">
    <p class="eyebrow" data-anim="fade-in" data-anim-at="0.2" data-anim-duration="0.5">holo ／ iridescent</p>
    <div class="title-wrap" data-anim="settle" data-anim-at="0.4" data-anim-duration="0.7">
      <h1 class="title">一场关于 AI 的真实对话<span class="title ghost r" aria-hidden="true">一场关于 AI 的真实对话</span><span class="title ghost b" aria-hidden="true">一场关于 AI 的真实对话</span></h1>
    </div>
    <p class="subtitle" data-anim="fade-in" data-anim-at="0.85" data-anim-duration="0.5">an honest conversation about ai</p>
    <p class="byline" data-anim="fade-in" data-anim-at="1.0" data-anim-duration="0.5"><span class="chip">Jeff × 卓霖</span> 现场记录</p>
  </div>
</div>

</div></div>
</body>
</html>
