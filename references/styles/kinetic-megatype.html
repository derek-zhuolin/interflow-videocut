<!--
  Style: kinetic-megatype (动态巨字 · 瑞士粗野巨字运动 · 巨字主角 + 真人小窗辅角)
  ═══════════════════════════════════════════════════════════════════════
  「炸裂族」之一，2026-06 从 playground 加固成生产级。定位：**巨型动态中文排版作主角**
  ——超大字铺满出血、逐行遮罩 reveal、行错位、橙色高亮块、出血竖排重影、纸张网格底。
  态度/宣言/金句/标题主导。这一款**字就是视觉**，真人退成右上角裁切小窗（辅角）。

  ▌架构（type-dominant，区别于 window-scene 的大窗）
    它**不是**真人大窗——纸底 + 巨字是主角，真人是右上角一个旋转裁切小窗（vidstrip 辅角）。
    持久 chrome：顶部 meta 条 + 出血重影 + 底部署名/takeaway + 进度条。per-card 换：巨字组 + 副标 +
    底部 takeaway。**满脸/不溢出铁律仍适用于小窗与巨字**（小窗竖向比例 ≥ 源；巨字 `clamp()` 防出血，
    出血裁切是设计但别裁掉关键字）。9:16 首选。frame 恒 clean。

  ▌render-harden（从 playground 原稿改了什么 —— 见 playground-gallery/kinetic-megatype.html）
    巨字逐行 reveal / breathe / blink / popIn / 进度 bar 全是 CSS @keyframes —— **全保留**（确定性）。
    **删两段脚本**：(1) `fit()` 视口缩放——hyperframes 自管画布尺寸，不需要；(2) `vid()` 那个**假口播
    剪影 canvas**（rAF 逐帧画剪影）——**整段删掉**，把 `.vidstrip` 里的 `<canvas id="vid">` 换成真
    `<video id="bg-video" ...>`（小窗口播），扫描线 .scan 覆层保留。**无 Math.random**，删完即确定性。

  ▌小窗 videoBounds（真人辅角，9:16）
    vidstrip {right:60, top:200, width:300, height:400}（旋转 2deg + 18px 橙色硬投影 + 黑边 + 扫描线）。
    起伏：这一款字是主角，运镜建议**固定**（小窗不动），或 peak 卡让小窗 popIn 强调一下即可。

  ▌配色  纸 #f4f1ea / 墨 #0a0a0a / 强调橙 #ff4a17；橙底白字高亮块 + 橙色 mark
  ▌字体  'PingFang SC'/'Helvetica Neue' 900（巨字）；meta/sub ui-monospace

  Best with: 态度/宣言/金句/标题主导/快节奏多拍。尾卡 card-cta 用纸底橙强调，保留 rig。
-->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>style · kinetic-megatype (动态巨字 · 巨字主角)</title>
<style>
  html, body { margin:0; padding:0; background:#050505; font-family:ui-sans-serif,system-ui,sans-serif; }
  .stage { position:relative; width:1080px; height:1920px; transform-origin:top left; transform:scale(0.42); overflow:hidden;
    background:#f4f1ea; color:#0a0a0a;
    background-image:linear-gradient(rgba(0,0,0,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.035) 1px,transparent 1px);
    background-size:90px 90px; }
  .card-host { position:absolute; left:0; top:300px; width:1080px; height:1320px; }
</style>
</head>
<body>
<div class="stage"><div class="card-host">

<div class="card" data-card-id="ref-kinetic-megatype">
  <style>
    .card[data-card-id="ref-kinetic-megatype"] .root { --ink:#0a0a0a; --paper:#f4f1ea; --accent:#ff4a17;
      position:relative; width:100%; height:100%; color:var(--ink);
      font-family:'PingFang SC','Helvetica Neue',Arial,sans-serif; container-type:inline-size; }
    /* line-height: 巨字两行的竖向行距。原为 .82（紧贴堆叠），但 2 字中文巨字（如「这个/效果」）
       在 .82 下相邻行的字会糊在一起、几乎看不出行缝 —— 实测过的可读性缺陷。改 1.04 留出干净行缝。
       想要更「行错位贴叠」的攻击性观感再往 .9 收，但别低于 .9，否则又糊。 */
    .card[data-card-id="ref-kinetic-megatype"] .mega { font-weight:900; line-height:1.04; letter-spacing:-.02em; }
    .card[data-card-id="ref-kinetic-megatype"] .ch-huge { font-size:clamp(220px,33cqi,360px); display:block; }
    .card[data-card-id="ref-kinetic-megatype"] .l1 { margin-left:-24px; }
    .card[data-card-id="ref-kinetic-megatype"] .l2 { margin-left:120px; }
    .card[data-card-id="ref-kinetic-megatype"] .subline { margin-top:18px; font-family:ui-monospace,'SF Mono',monospace;
      font-size:30px; letter-spacing:.42em; text-transform:uppercase; color:#555; font-weight:600; }
    .card[data-card-id="ref-kinetic-megatype"] .subline::before { content:"//  "; color:var(--accent); }
    .card[data-card-id="ref-kinetic-megatype"] .ai-row { display:flex; align-items:baseline; margin:48px 0 0 -14px; }
    .card[data-card-id="ref-kinetic-megatype"] .ai-mark { font-size:clamp(320px,48cqi,520px); line-height:.7; font-weight:900;
      letter-spacing:-.04em; font-family:'Helvetica Neue',Arial,sans-serif; }
    .card[data-card-id="ref-kinetic-megatype"] .ai-mark .a { color:var(--ink); }
    .card[data-card-id="ref-kinetic-megatype"] .ai-mark .i { color:var(--accent); }
    .card[data-card-id="ref-kinetic-megatype"] .ai-tail { margin-left:34px; padding-bottom:60px; font-size:clamp(80px,11cqi,116px);
      font-weight:900; line-height:.88; letter-spacing:-.01em; }
    .card[data-card-id="ref-kinetic-megatype"] .ai-tail .hl { background:var(--accent); color:var(--paper);
      padding:2px 16px 8px; display:inline-block; transform:rotate(-2deg); }
    .card[data-card-id="ref-kinetic-megatype"] .takeaway { position:absolute; bottom:0; left:0; right:0;
      font-size:clamp(44px,7.5cqi,58px); font-weight:900; line-height:1.08; letter-spacing:-.01em; max-width:880px;
      border-top:3px solid var(--ink); padding-top:28px; }
    .card[data-card-id="ref-kinetic-megatype"] .takeaway .mark { color:var(--accent); }
    .card[data-card-id="ref-kinetic-megatype"] .takeaway .u { background-image:linear-gradient(transparent 60%, rgba(255,74,23,.35) 0); }
  </style>
  <div class="root">
    <div class="mega">
      <span class="ch-huge l1" data-anim="settle" data-anim-at="0.35" data-anim-duration="0.8" data-anim-from="bottom" data-anim-distance="120">真实</span>
      <span class="ch-huge l2" data-anim="settle" data-anim-at="0.55" data-anim-duration="0.8" data-anim-from="bottom" data-anim-distance="120">对话</span>
    </div>
    <div class="subline" data-anim="fade-in" data-anim-at="1.1" data-anim-duration="0.6">an honest conversation about ai</div>
    <div class="ai-row">
      <span class="ai-mark" data-anim="settle" data-anim-at="0.9" data-anim-duration="0.9" data-anim-from="bottom" data-anim-distance="120"><span class="a">A</span><span class="i">I</span></span>
      <span class="ai-tail" data-anim="settle" data-anim-at="1.15" data-anim-duration="0.9" data-anim-from="bottom" data-anim-distance="120">不是答案<br>是<span class="hl">借口</span></span>
    </div>
    <div class="takeaway" data-anim="settle" data-anim-at="1.5" data-anim-duration="0.7">我们聊的从来<span class="mark">不是 AI 能做什么，</span>而是<span class="u">人到底想留下什么。</span></div>
  </div>
</div>

</div></div>
</body>
</html>
