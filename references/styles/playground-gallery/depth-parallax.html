<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interflow · 纵深视差 depth-parallax</title>
<style>
  :root{
    --ink:#f6f1ea;
    --dim:rgba(246,241,234,.62);
    --faint:rgba(246,241,234,.34);
    --accent:#E0894A;
    --accent-deep:#C9743A;
    --glass:rgba(22,18,16,.50);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ margin:0; }
  body{
    width:1080px; height:1920px; overflow:hidden;
    background:#07060a; color:var(--ink);
    font-family:'PingFang SC','Hiragino Sans GB',ui-sans-serif,system-ui,sans-serif;
  }

  /* ====== 纵深舞台：perspective 决定 Z 轴透视强度 ====== */
  #stage{
    position:absolute; inset:0; width:1080px; height:1920px;
    perspective:1400px; perspective-origin:50% 44%;
    overflow:hidden;
    transform-style:preserve-3d;
    background:
      radial-gradient(120% 80% at 50% 8%, #1c1726 0%, #0c0a12 46%, #07060a 100%);
  }
  /* 整个空间缓慢运镜（推拉 + 微摆） */
  #space{
    position:absolute; inset:0;
    transform-style:preserve-3d;
    animation:dolly 22s ease-in-out infinite;
  }
  @keyframes dolly{
    0%,100%{ transform:translateZ(0) rotateY(-2.2deg) rotateX(1.1deg); }
    50%    { transform:translateZ(80px) rotateY(2.2deg) rotateX(-0.8deg); }
  }

  .layer{ position:absolute; inset:0; transform-style:preserve-3d; }

  /* ====== 远景层 z=-700：虚化、暗、慢 ====== */
  .far{ transform:translateZ(-700px) scale(1.6); filter:blur(7px) brightness(.62) saturate(1.15); }
  .far .orb{ position:absolute; border-radius:50%; mix-blend-mode:screen; }
  .orb-a{ width:760px; height:760px; left:-160px; top:120px;
    background:radial-gradient(circle at 38% 34%, rgba(224,137,74,.85), rgba(224,137,74,0) 66%);
    animation:driftA 26s ease-in-out infinite; }
  .orb-b{ width:620px; height:620px; right:-140px; top:680px;
    background:radial-gradient(circle at 50% 50%, rgba(120,96,210,.70), rgba(120,96,210,0) 66%);
    animation:driftB 30s ease-in-out infinite; }
  .orb-c{ width:540px; height:540px; left:240px; bottom:-120px;
    background:radial-gradient(circle at 50% 50%, rgba(64,150,180,.55), rgba(64,150,180,0) 66%);
    animation:driftA 34s ease-in-out infinite reverse; }
  @keyframes driftA{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(60px,-50px); } }
  @keyframes driftB{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(-70px,40px); } }

  /* 远景细密星点（canvas） */
  #stars{ position:absolute; inset:0; width:1080px; height:1920px; opacity:.55; }

  /* ====== 中远：口播人物剪影区（渐变 + SVG 剪影） z=-260 ====== */
  .person{ transform:translateZ(-260px) scale(1.22); }
  .person-stage{
    position:absolute; left:50%; top:540px; width:760px; height:980px;
    transform:translateX(-50%);
    border-radius:40px; overflow:hidden;
    background:
      linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0) 30%),
      radial-gradient(78% 60% at 50% 22%, rgba(224,137,74,.30), rgba(224,137,74,0) 60%),
      linear-gradient(195deg, #241b2c 0%, #14101b 55%, #0c0a12 100%);
    box-shadow:0 60px 140px rgba(0,0,0,.55), inset 0 0 120px rgba(0,0,0,.45);
  }
  /* 顶光束 */
  .person-stage::before{
    content:''; position:absolute; left:50%; top:-40px; width:560px; height:880px;
    transform:translateX(-50%);
    background:conic-gradient(from 180deg at 50% 0%, rgba(224,137,74,0) 78deg, rgba(224,137,74,.22) 90deg, rgba(255,236,210,.30) 96deg, rgba(224,137,74,.22) 102deg, rgba(224,137,74,0) 114deg);
    filter:blur(2px); opacity:.9; animation:beam 9s ease-in-out infinite;
  }
  @keyframes beam{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
  .silhouette{
    position:absolute; left:50%; bottom:-6px; width:520px; height:680px;
    transform:translateX(-50%);
    filter:drop-shadow(0 0 60px rgba(224,137,74,.32));
  }
  .silhouette path{ fill:url(#silGrad); }
  .rim{ fill:none; stroke:rgba(255,222,190,.55); stroke-width:3; }
  /* 「正在说话」声波 */
  .wave{ position:absolute; left:50%; bottom:70px; transform:translateX(-50%); display:flex; gap:9px; align-items:flex-end; height:54px; }
  .wave i{ width:8px; border-radius:6px; background:linear-gradient(180deg,#ffd9b0,var(--accent)); animation:vu 1.1s ease-in-out infinite; }
  .wave i:nth-child(1){ height:18px; animation-delay:0s; }
  .wave i:nth-child(2){ height:38px; animation-delay:.12s; }
  .wave i:nth-child(3){ height:54px; animation-delay:.24s; }
  .wave i:nth-child(4){ height:30px; animation-delay:.36s; }
  .wave i:nth-child(5){ height:46px; animation-delay:.48s; }
  .wave i:nth-child(6){ height:22px; animation-delay:.6s; }
  .wave i:nth-child(7){ height:40px; animation-delay:.72s; }
  @keyframes vu{ 0%,100%{ transform:scaleY(.4); opacity:.7; } 50%{ transform:scaleY(1); opacity:1; } }

  .rec{ position:absolute; left:34px; top:32px; display:flex; align-items:center; gap:10px;
    font:600 22px/1 ui-monospace,'SF Mono',monospace; letter-spacing:.18em; color:rgba(255,255,255,.82); }
  .rec .dot{ width:13px; height:13px; border-radius:50%; background:#ff5a4d; box-shadow:0 0 16px #ff5a4d; animation:blink 1.4s steps(1) infinite; }
  @keyframes blink{ 0%,60%{opacity:1;} 61%,100%{opacity:.25;} }

  /* ====== 中景：悬浮玻璃信息卡 z=+40，主角，缓慢视差浮动 ====== */
  .mid{ transform:translateZ(40px); }
  .panel{
    position:absolute; left:64px; right:64px; bottom:300px;
    padding:54px 56px 48px;
    border-radius:34px;
    background:var(--glass);
    -webkit-backdrop-filter:blur(26px) saturate(1.25);
    backdrop-filter:blur(26px) saturate(1.25);
    border:1.5px solid rgba(255,255,255,.16);
    box-shadow:
      0 50px 120px rgba(0,0,0,.55),
      0 0 0 1px rgba(0,0,0,.3),
      inset 0 1.5px 0 rgba(255,255,255,.22);
    animation:floatCard 12s ease-in-out infinite;
  }
  /* 卡片自身相对空间的轻微反向漂移，强化视差 */
  @keyframes floatCard{
    0%,100%{ transform:translate(0,0) rotateX(0deg) rotateY(0deg); }
    50%    { transform:translate(0,-22px) rotateX(1.4deg) rotateY(-1.2deg); }
  }
  /* 玻璃高光边 */
  .panel::after{
    content:''; position:absolute; inset:0; border-radius:34px; pointer-events:none;
    background:linear-gradient(135deg, rgba(255,255,255,.14), rgba(255,255,255,0) 38%);
    mix-blend-mode:screen;
  }
  .kicker{ display:inline-flex; align-items:center; gap:12px;
    font:600 24px/1 ui-monospace,'SF Mono',monospace; letter-spacing:.24em; text-transform:uppercase;
    color:var(--accent); }
  .kicker::before{ content:''; width:34px; height:3px; border-radius:2px; background:var(--accent); }
  .title{ margin-top:26px; font-weight:800; font-size:104px; line-height:1.04; letter-spacing:-.02em;
    background:linear-gradient(180deg,#fff 0%, #f3e7da 60%, #e9c8a6 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 30px rgba(224,137,74,.18); }
  .title b{ color:var(--accent); -webkit-text-fill-color:var(--accent); }
  .sub-en{ margin-top:20px; font:500 30px/1.2 ui-monospace,'SF Mono',monospace;
    letter-spacing:.04em; color:var(--dim); }
  .rule{ height:1.5px; margin:34px 0 28px; border-radius:2px;
    background:linear-gradient(90deg, var(--accent), rgba(224,137,74,.05));
    transform-origin:left; animation:grow 5s ease-in-out infinite alternate; }
  @keyframes grow{ from{ transform:scaleX(.4); } to{ transform:scaleX(1); } }
  .takeaway{ font-size:38px; line-height:1.5; font-weight:500; color:#f1ece4; }
  .takeaway em{ font-style:normal; color:var(--accent); font-weight:700; }
  .byline{ margin-top:30px; display:flex; align-items:center; gap:16px;
    font-size:25px; color:var(--faint); letter-spacing:.02em; }
  .byline .avatar{ width:46px; height:46px; border-radius:50%;
    background:linear-gradient(135deg,var(--accent),var(--accent-deep)); flex:none;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:20px; color:#1a120c; }
  .byline b{ color:var(--ink); font-weight:600; }
  .byline .sep{ color:rgba(224,137,74,.6); }

  /* ====== 前景：锐利近景碎片/光斑 z=+360，最快视差 ====== */
  .near{ transform:translateZ(360px); }
  .shard{ position:absolute; border-radius:5px; opacity:.9; will-change:transform; }
  .shard.glow{ filter:drop-shadow(0 0 14px rgba(224,137,74,.9)); }
  .s1{ width:26px; height:26px; left:120px; top:300px; background:var(--accent); transform:rotate(20deg);
    animation:near1 14s ease-in-out infinite; }
  .s2{ width:14px; height:14px; right:160px; top:430px; background:#ffd9b0;
    animation:near2 11s ease-in-out infinite; }
  .s3{ width:9px; height:9px; left:240px; bottom:520px; border-radius:50%; background:#fff;
    box-shadow:0 0 18px #fff; animation:near1 9s ease-in-out infinite reverse; }
  .s4{ width:34px; height:6px; right:120px; bottom:640px; background:linear-gradient(90deg,var(--accent),transparent);
    animation:near2 16s ease-in-out infinite reverse; }
  .s5{ width:18px; height:18px; left:80px; bottom:380px; background:transparent;
    border:3px solid var(--accent); border-radius:50%; animation:near1 12s ease-in-out infinite; }
  .s6{ width:11px; height:11px; right:280px; top:240px; border-radius:50%; background:#a78bff;
    box-shadow:0 0 16px #a78bff; animation:near2 10s ease-in-out infinite; }
  @keyframes near1{ 0%,100%{ transform:translate(0,0) rotate(0deg); } 50%{ transform:translate(60px,46px) rotate(40deg); } }
  @keyframes near2{ 0%,100%{ transform:translate(0,0) rotate(0deg); } 50%{ transform:translate(-54px,-40px) rotate(-30deg); } }

  /* 顶部章节条 + 底部进度轴（HUD chrome） */
  .hud-top{ position:absolute; left:64px; right:64px; top:54px; display:flex; gap:14px; z-index:20; }
  .hud-top .ch{ flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,.14); overflow:hidden; }
  .hud-top .ch.on::after{ content:''; display:block; height:100%; width:100%;
    background:linear-gradient(90deg,var(--accent),#ffd9b0); animation:fillch 6s linear infinite; transform-origin:left; }
  @keyframes fillch{ from{ transform:scaleX(0);} to{ transform:scaleX(1);} }
  .hud-bottom{ position:absolute; left:64px; right:64px; bottom:64px; z-index:20;
    display:flex; align-items:center; gap:20px; }
  .scrub{ flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,.14); position:relative; overflow:hidden; }
  .scrub::after{ content:''; position:absolute; inset:0; transform-origin:left;
    background:linear-gradient(90deg,var(--accent),#ffd9b0); animation:scrub 18s linear infinite; }
  @keyframes scrub{ from{ transform:scaleX(0);} to{ transform:scaleX(1);} }
  .speed{ font:600 22px/1 ui-monospace,'SF Mono',monospace; color:var(--accent); letter-spacing:.1em; }

  /* 全屏 legibility 暗角，保证白字可读 */
  .vignette{ position:absolute; inset:0; pointer-events:none; z-index:15;
    background:
      radial-gradient(120% 80% at 50% 30%, transparent 40%, rgba(0,0,0,.35) 100%),
      linear-gradient(180deg, rgba(0,0,0,.25) 0%, transparent 22%, transparent 62%, rgba(0,0,0,.55) 100%); }
  .grain{ position:absolute; inset:0; pointer-events:none; z-index:16; opacity:.05; mix-blend-mode:overlay;
    background-image:repeating-conic-gradient(#fff 0% 0.0006%, #000 0% 0.0012%); }
</style>
</head>
<body>
<div id="stage">
  <div id="space">

    <!-- 远景层 -->
    <div class="layer far">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
    </div>
    <canvas id="stars" width="1080" height="1920"></canvas>

    <!-- 口播人物剪影区 -->
    <div class="layer person">
      <div class="person-stage">
        <div class="rec"><span class="dot"></span>REC · 现场</div>
        <svg class="silhouette" viewBox="0 0 520 680" aria-hidden="true">
          <defs>
            <linearGradient id="silGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#3a2c1e"/>
              <stop offset="1" stop-color="#0c0a12"/>
            </linearGradient>
          </defs>
          <!-- 头 + 肩 半身剪影 -->
          <path d="M260 70
            c52 0 92 42 92 100 c0 40-20 72-46 90
            c60 18 104 56 130 118 c14 34 22 78 26 132
            l-404 0 c4-54 12-98 26-132 c26-62 70-100 130-118
            c-26-18-46-50-46-90 c0-58 40-100 92-100 Z"/>
          <path class="rim" d="M260 70 c52 0 92 42 92 100 c0 40-20 72-46 90"/>
        </svg>
        <div class="wave"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
      </div>
    </div>

    <!-- 中景玻璃卡 -->
    <div class="layer mid">
      <div class="panel">
        <span class="kicker">INTERFLOW · 口播</span>
        <h1 class="title">一场关于 <b>AI</b><br>的真实对话</h1>
        <div class="sub-en">an honest conversation about ai</div>
        <div class="rule"></div>
        <p class="takeaway">不聊概念，不画大饼——<em>把真实用起来的体感</em>讲给你听。</p>
        <div class="byline">
          <span class="avatar">J</span>
          <span><b>Jeff</b> <span class="sep">×</span> <b>卓霖</b></span>
          <span class="sep">·</span>
          <span>现场记录</span>
        </div>
      </div>
    </div>

    <!-- 前景锐利碎片 -->
    <div class="layer near">
      <span class="shard glow s1"></span>
      <span class="shard s2"></span>
      <span class="shard glow s3"></span>
      <span class="shard s4"></span>
      <span class="shard glow s5"></span>
      <span class="shard s6"></span>
    </div>

  </div><!-- /space -->

  <div class="vignette"></div>
  <div class="grain"></div>

  <!-- HUD chrome（不随视差，贴屏） -->
  <div class="hud-top">
    <span class="ch on"></span><span class="ch"></span><span class="ch"></span><span class="ch"></span>
  </div>
  <div class="hud-bottom">
    <div class="scrub"></div>
    <span class="speed">1.0×</span>
  </div>
</div>

<script>
  // 远景星点（确定性绘制，自包含）
  (function(){
    const c = document.getElementById('stars');
    const x = c.getContext('2d');
    let seed = 20260616;
    const rnd = ()=> (seed = (seed*1103515245+12345) & 0x7fffffff) / 0x7fffffff;
    for(let i=0;i<160;i++){
      const px = rnd()*1080, py = rnd()*1920, r = rnd()*1.8+0.3, a = rnd()*0.6+0.15;
      x.beginPath(); x.arc(px,py,r,0,Math.PI*2);
      const tint = rnd();
      x.fillStyle = tint>0.7 ? `rgba(224,137,74,${a})` : `rgba(255,248,240,${a})`;
      x.fill();
    }
  })();
</script>
</body>
</html>
