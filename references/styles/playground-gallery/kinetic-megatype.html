<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interflow · Kinetic Megatype</title>
<style>
  html, body { margin: 0; padding: 0; background: #050505; overflow: hidden; }

  :root{
    --ink: #0a0a0a;
    --paper: #f4f1ea;
    --accent: #ff4a17;   /* 强调橙 */
    --accent2:#ff2b2b;   /* 备用红 */
  }

  *{ box-sizing: border-box; }

  /* ---- 舞台：固定 1080×1920，自动缩放铺满视口 ---- */
  #viewport{
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #050505;
  }
  #stage{
    position: relative;
    width: 1080px; height: 1920px;
    background: var(--paper);
    overflow: hidden;
    transform-origin: center center;
    font-family: "PingFang SC", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--ink);
  }

  /* 纸张噪点 + 网格底纹（纯 CSS，零依赖） */
  #stage::before{
    content:""; position:absolute; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(0,0,0,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,.035) 1px, transparent 1px);
    background-size: 90px 90px;
    opacity:.5;
  }
  /* 噪点 */
  #stage::after{
    content:""; position:absolute; inset:0; z-index:60; pointer-events:none;
    opacity:.05; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ===================== 顶部 META 条 ===================== */
  .topbar{
    position:absolute; top:0; left:0; right:0; z-index:30;
    display:flex; justify-content:space-between; align-items:center;
    padding: 46px 60px 0;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 26px; letter-spacing:.18em; text-transform:uppercase;
    font-weight:600;
    opacity:0; animation: fadeDown 1s .2s ease forwards;
  }
  .topbar .dot{ display:inline-block; width:14px; height:14px; border-radius:50%;
    background:var(--accent); margin-right:14px; vertical-align:middle;
    animation: blink 1.4s steps(2) infinite; }
  .topbar .right{ color:#777; }

  /* ===================== 巨字主体 ===================== */
  .mega{
    position:absolute; left:0; right:0; z-index:20;
    font-weight:900;
    line-height:.82;
    letter-spacing:-.02em;
  }

  /* 行容器：用于 overflow 遮罩 reveal */
  .line{ overflow:hidden; display:block; }
  .line > span{ display:block; transform: translateY(110%); }

  /* 第一组：超大「真实对话」铺满，可裁切出血 */
  .group-a{ top: 300px; }
  .ch-huge{ font-size: 360px; }              /* 单字超大 */
  .l1{ margin-left: -24px; }                  /* 出血到左边缘外 */
  .l2{ margin-left: 120px; }                  /* 行错位 */

  /* 第二组：AI 巨字 + 英文 */
  .group-b{ top: 1010px; }
  .ai-row{
    display:flex; align-items:baseline; gap:0;
    margin-left:-14px;
  }
  .ai-mark{
    font-size: 520px; line-height:.7; font-weight:900;
    letter-spacing:-.04em;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }
  .ai-mark .a{ color: var(--ink); }
  .ai-mark .i{ color: var(--accent); }       /* 橙色高亮一个字符 */
  .ai-tail{
    margin-left: 34px; padding-bottom: 60px;
    font-size: 116px; font-weight:900; line-height:.88;
    letter-spacing:-.01em;
  }
  .ai-tail .hl{
    background: var(--accent); color: var(--paper);
    padding: 2px 16px 8px; display:inline-block; transform: rotate(-2deg);
  }

  /* 英文副标 */
  .subline{
    position:absolute; top: 940px; left: 60px; z-index:25;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 30px; letter-spacing:.42em; text-transform:uppercase;
    color:#555; font-weight:600;
    opacity:0; animation: fadeRight 1s 1.1s ease forwards;
  }
  .subline::before{ content:"//  "; color:var(--accent); }

  /* 出血竖排重影「对话」（负空间 + 装饰巨字） */
  .ghost{
    position:absolute; right:-60px; top:560px; z-index:10;
    font-size: 300px; font-weight:900; line-height:.8;
    color: transparent; -webkit-text-stroke: 3px rgba(10,10,10,.10);
    writing-mode: vertical-rl; letter-spacing:-.06em;
    pointer-events:none;
  }

  /* ===================== 口播小窗（裁切条，辅角） ===================== */
  .vidstrip{
    position:absolute; z-index:40;
    right: 60px; top: 200px;
    width: 300px; height: 400px;
    overflow:hidden;
    border: 4px solid var(--ink);
    box-shadow: 18px 18px 0 var(--accent);
    transform: rotate(2deg);
    opacity:0; animation: popIn .8s 1.5s cubic-bezier(.2,1.2,.3,1) forwards;
  }
  .vidstrip .label{
    position:absolute; bottom:0; left:0; right:0; z-index:3;
    background:var(--ink); color:var(--paper);
    font-family: ui-monospace, Menlo, monospace;
    font-size:18px; letter-spacing:.2em; padding:8px 12px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .vidstrip .rec{ color:var(--accent); }
  .vidstrip .rec::before{ content:"●"; margin-right:6px; animation: blink 1.2s steps(2) infinite; }
  .vid-canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
  /* 扫描线覆层 */
  .vidstrip .scan{
    position:absolute; inset:0; z-index:2; pointer-events:none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0 2px, transparent 2px 5px);
    mix-blend-mode: multiply;
  }

  /* ===================== 底部：署名 + takeaway ===================== */
  .footer{
    position:absolute; left:0; right:0; bottom:0; z-index:30;
    padding: 0 60px 70px;
  }
  .credit{
    font-family: ui-monospace, Menlo, monospace;
    font-size: 30px; letter-spacing:.1em; color:#444; font-weight:600;
    margin-bottom: 26px;
    border-top: 3px solid var(--ink); padding-top: 22px;
    display:flex; align-items:center; gap:16px;
    opacity:0; animation: fadeUp .9s 1.9s ease forwards;
  }
  .credit b{ color:var(--ink); font-weight:800; }
  .credit .x{ color:var(--accent); font-size:38px; }

  .takeaway{
    font-size: 58px; font-weight:900; line-height:1.08;
    letter-spacing:-.01em; max-width: 880px;
    opacity:0; animation: fadeUp .9s 2.15s ease forwards;
  }
  .takeaway .mark{ color:var(--accent); }
  .takeaway .u{
    background-image: linear-gradient(transparent 60%, rgba(255,74,23,.35) 0);
  }

  /* 进度条 */
  .progress{
    position:absolute; left:60px; right:60px; bottom:40px; z-index:30;
    height:5px; background: rgba(0,0,0,.12);
  }
  .progress i{ display:block; height:100%; width:0; background:var(--accent);
    animation: bar 6s linear infinite; }

  /* ===================== 关键帧 ===================== */
  @keyframes revealUp{ to{ transform: translateY(0); } }
  @keyframes fadeDown{ from{opacity:0; transform:translateY(-20px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(28px);} to{opacity:1; transform:translateY(0);} }
  @keyframes fadeRight{ from{opacity:0; transform:translateX(-30px);} to{opacity:1; transform:translateX(0);} }
  @keyframes blink{ 50%{ opacity:0; } }
  @keyframes popIn{ 0%{opacity:0; transform:rotate(2deg) scale(.6);} 100%{opacity:1; transform:rotate(2deg) scale(1);} }
  @keyframes bar{ 0%{width:0} 100%{width:100%} }

  /* 巨字逐行入场（遮罩 reveal + 错位时差） */
  .l1 > span{ animation: revealUp 1s .35s cubic-bezier(.16,1,.3,1) forwards; }
  .l2 > span{ animation: revealUp 1s .55s cubic-bezier(.16,1,.3,1) forwards; }
  .ai-line > span{ animation: revealUp 1.1s .9s cubic-bezier(.16,1,.3,1) forwards; }
  .ai-tail-line > span{ animation: revealUp 1.1s 1.15s cubic-bezier(.16,1,.3,1) forwards; }

  /* 整体呼吸（极轻微缩放，给静帧一点活气） */
  .mega{ animation: breathe 9s ease-in-out infinite; }
  @keyframes breathe{ 0%,100%{ transform: translateZ(0) scale(1); } 50%{ transform: scale(1.012); } }
</style>
</head>
<body>
<div id="viewport">
  <div id="stage">

    <!-- 顶部 meta -->
    <div class="topbar">
      <span><span class="dot"></span>INTERFLOW · LIVE TALK</span>
      <span class="right">NO.016 / 现场</span>
    </div>

    <!-- 出血重影 -->
    <div class="ghost">对话</div>

    <!-- 口播裁切条（辅角） -->
    <div class="vidstrip">
      <canvas class="vid-canvas" id="vid" width="300" height="400"></canvas>
      <div class="scan"></div>
      <div class="label"><span class="rec">REC</span><span>口播 · 0:42</span></div>
    </div>

    <!-- 巨字主体 -->
    <div class="mega group-a">
      <span class="line l1"><span class="ch-huge">真实</span></span>
      <span class="line l2"><span class="ch-huge">对话</span></span>
    </div>

    <div class="subline">an honest conversation about ai</div>

    <div class="mega group-b">
      <div class="ai-row">
        <span class="line ai-line"><span class="ai-mark"><span class="a">A</span><span class="i">I</span></span></span>
        <span class="line ai-tail-line"><span class="ai-tail">不是答案<br>是<span class="hl">借口</span></span></span>
      </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
      <div class="credit">
        <b>Jeff</b> <span class="x">×</span> <b>卓霖</b>
        <span style="color:#999">· 现场记录</span>
      </div>
      <div class="takeaway">
        我们聊的从来<span class="mark">不是 AI 能做什么，</span><br>
        而是<span class="u">人到底想留下什么。</span>
      </div>
    </div>

    <div class="progress"><i></i></div>

  </div>
</div>

<script>
  /* ---- 缩放铺满视口，保持 1080×1920 比例 ---- */
  (function fit(){
    const stage = document.getElementById('stage');
    function resize(){
      const s = Math.min(innerWidth/1080, innerHeight/1920);
      stage.style.transform = 'scale(' + s + ')';
    }
    addEventListener('resize', resize); resize();
  })();

  /* ---- 口播小窗：纯 canvas 模拟一个动起来的人物剪影口播画面（零外部资源）---- */
  (function vid(){
    const c = document.getElementById('vid'), x = c.getContext('2d');
    const W = c.width, H = c.height;
    let t = 0;
    function draw(){
      t += 0.04;
      // 背景渐变
      const g = x.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'#1a1a1a'); g.addColorStop(1,'#000');
      x.fillStyle = g; x.fillRect(0,0,W,H);

      // 背后光圈（轻微呼吸）
      const r = 120 + Math.sin(t*0.8)*14;
      const rg = x.createRadialGradient(W/2, H*0.42, 10, W/2, H*0.42, r);
      rg.addColorStop(0,'rgba(255,74,23,0.55)');
      rg.addColorStop(1,'rgba(255,74,23,0)');
      x.fillStyle = rg; x.fillRect(0,0,W,H);

      // 人物剪影（头 + 肩），轻微点头
      const nod = Math.sin(t)*4;
      x.fillStyle = '#000';
      // 肩
      x.beginPath();
      x.moveTo(W*0.5-150, H);
      x.bezierCurveTo(W*0.5-150, H*0.72, W*0.5-78, H*0.66, W*0.5, H*0.66+nod*0.3);
      x.bezierCurveTo(W*0.5+78, H*0.66, W*0.5+150, H*0.72, W*0.5+150, H);
      x.closePath(); x.fill();
      // 头
      x.beginPath();
      x.ellipse(W*0.5, H*0.46+nod, 62, 74, 0, 0, Math.PI*2);
      x.fill();

      // 描边轮廓高光
      x.strokeStyle = 'rgba(255,74,23,0.5)'; x.lineWidth = 2;
      x.beginPath(); x.ellipse(W*0.5, H*0.46+nod, 62, 74, 0, -1.1, 0.6); x.stroke();

      // 说话波形（底部）
      x.fillStyle = '#ff4a17';
      const bars = 11, bw = 8, gap = 9, total = bars*(bw+gap)-gap;
      let sx = (W-total)/2;
      for(let i=0;i<bars;i++){
        const h = 6 + Math.abs(Math.sin(t*3 + i))*26;
        x.fillRect(sx + i*(bw+gap), H-44-h, bw, h);
      }
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>
</body>
</html>
