<!--
  Style: minimal — 纯黑白 · 巨字 · 极致留白（Swiss 支柱的「反向耦合」成员）
  ─────────────────────────────────────────────────────────────────────
  歸藏家族 · Swiss 支柱（host class .pillar-swiss）。读 guizang-dna.md。
  身份：唯一**故意反向**字号字重耦合的风格——巨字用 900，weight & size 自己做功。
  其余（kicker/meta/正文）仍守 Swiss 纪律：mono 大写小标签、模块化间距、暖白底。
  克制到只剩一句话 + 一条线 + 一行注，是它的高级感来源。

  Tokens（禁自定义 hex）
    paper #fafaf8（暖白）· ink #0a0a0a · grey-3 #737373
    accent #0a0a0a（默认无色——纯黑；可点一个 IKB/red mark 做唯一焦点）
  字阶：巨标题 **900**（例外）· kicker/meta 600（mono）· 正文 400
  Components: .kicker .meta .rule .mark
  Best with  layouts: split, stack, overlay   frames: clean, hairline
             content: 金句 / 极简陈述 / 大字标题 / 单一数字揭示
-->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>style · minimal</title>
<style>
  html, body { margin: 0; padding: 0; background: #0a0c12;
               font-family: ui-sans-serif, system-ui, sans-serif; }
  .stage { position: relative; width: 1920px; height: 1080px;
           transform-origin: top left; transform: scale(0.5); overflow: hidden; }
  .card-host { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; }
</style>
</head>
<body>
<div class="stage"><div class="card-host">

<div class="card" data-card-id="ref-minimal">
  <style>
    .card[data-card-id="ref-minimal"] { width: 100%; height: 100%; }
    .card[data-card-id="ref-minimal"] .root {
      --paper: #fafaf8; --ink: #0a0a0a; --grey-3: #737373;
      --text-2: #525252; --text-3: #737373; --hair: #d4d4d2;
      --accent: #0a0a0a; --accent-on: #fafaf8;
      --gz-sans: "Inter", "Helvetica Neue", "Helvetica", "Arial", system-ui, "PingFang SC", sans-serif;
      --gz-mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;

      width: 100%; height: 100%; position: relative; overflow: hidden;
      box-sizing: border-box; container-type: inline-size;
      background: var(--paper); color: var(--ink); font-family: var(--gz-sans);
      padding: 80px 96px;
      display: flex; flex-direction: column; justify-content: center; gap: 52px;
    }
    /* mono meta — small = heavy (600), the Swiss discipline minimal keeps */
    .card[data-card-id="ref-minimal"] .meta-row {
      display: flex; align-items: baseline; justify-content: space-between; }
    .card[data-card-id="ref-minimal"] .kicker {
      font: 600 18px/1 var(--gz-mono); letter-spacing: .3em;
      text-transform: uppercase; color: var(--ink); }
    .card[data-card-id="ref-minimal"] .meta {
      font: 500 16px/1 var(--gz-mono); letter-spacing: .24em;
      text-transform: uppercase; color: var(--text-3); }
    /* THE EXCEPTION — monumental 900; weight & size do the work */
    .card[data-card-id="ref-minimal"] .title {
      margin: 0; font: 900 clamp(88px, 13cqi, 140px)/0.94 var(--gz-sans);
      letter-spacing: -.045em; max-width: 96%;
      overflow-wrap: anywhere; text-wrap: balance; }
    .card[data-card-id="ref-minimal"] .mark {
      background: var(--accent); color: var(--accent-on); padding: 0 .1em;
      box-decoration-break: clone; -webkit-box-decoration-break: clone; }
    .card[data-card-id="ref-minimal"] .rule { width: 0; height: 4px; background: var(--ink); }
    .card[data-card-id="ref-minimal"] .detail {
      margin: 0; font: 400 36px/1.4 var(--gz-sans); color: var(--text-2);
      max-width: 82%; letter-spacing: -.005em; overflow-wrap: anywhere; }
  </style>

  <div class="root pillar-swiss">
    <div class="meta-row">
      <span class="kicker" data-anim="drift" data-anim-axis="y" data-anim-amp="6" data-anim-period="13">TAKEAWAY</span>
      <span class="meta" data-anim="fade-in" data-anim-at="0.18" data-anim-duration="0.5">01 / 05</span>
    </div>

    <h1 class="title" data-anim="kinetic-chars" data-anim-at="0.3" data-anim-duration="0.6"
        data-anim-stagger="0.05" data-anim-pattern="pop"
      ><span class="char">五</span><span class="char">秒</span><span class="char">决</span><span class="char">定</span><span class="char">一</span><span class="char">切</span></h1>

    <div class="rule" data-anim="grow-x" data-anim-at="0.9" data-anim-duration="0.5"
         data-anim-target-w="240"></div>

    <p class="detail" data-anim="settle" data-anim-at="1.05" data-anim-duration="0.45">
      用户给一个新界面的时间不超过五秒。第一屏不需要解释，需要让人立刻知道这是什么、为什么有用。
    </p>
  </div>
</div>

</div></div>
</body>
</html>
