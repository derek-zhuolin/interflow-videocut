<!--
  Style: ink-figure (字骸成形 / 水墨字相) — warm rice paper · sumi-ink calligraphy
                     · seal-red accent · 竖排序号 title · 字成人形 inside an enso
  ─────────────────────────────────────────────────────────────────────
  An ink-wash 国风 / 武侠 style. The signature: hundreds of tiny ink glyphs
  swarm and settle into a HUMAN FIGURE (a kung-fu pose) inside a thin enso
  circle — "字骸成形, 形随意转" (characters form the body, the form follows the
  meaning). Left column is a 竖排 (vertical) serif headline with a seal-red 序号
  chip (壹/贰/叁); a faint giant ghost glyph (武) watermarks the page; everything
  sits on warm rice paper with a fiber grain. Restrained, premium, brush-made —
  NOT a busy collage. Use it for 国风/文化/功夫/书法/茶/禅 content, 招式谱-style
  enumerations, or any reflective piece wanting an ink-scholar tone.

  Tokens
    paper    #F0EBDF   (rice paper — page body)
    paper2   #E7DFCC   (deeper paper — panels / ghost)
    ink      #2A2622   (sumi black — title, glyphs, 2px hairlines)
    ink-soft #6E665B   (muted labels / couplet annotation)
    seal     #A4291F   (朱砂 seal red — 序号 chip, accent glyphs, active dot)
    seal-dim rgba(164,41,31,.45)
    gold     #8C7A53   (faint meta / footer)
  Fonts (only bundled fonts — LXGW WenKai TC ships with the skill)
    headline / glyphs — 'LXGW WenKai TC', ui-serif, "Songti SC", "STSong", serif
    latin meta        — 'Inter', ui-sans-serif, system-ui, sans-serif
  Signature moves
    · warm rice paper + faint fiber grain (one cross-hatch, ~0.06 opacity)
    · 竖排 (writing-mode: vertical-rl) big kai headline on the left
    · seal-red 序号 chip (壹/贰/叁…) — a small filled square, paper-color glyph
    · thin enso guide circle (1.5px ink ring, ~78% closed) as the figure stage
    · the figure: small ink glyphs clustered into a standing/posing silhouette;
      a handful rendered in seal-red for life; a few heavier/larger near the core
    · giant ghost glyph (武) behind everything at ~0.05, kai weight
    · tiny vertical couplet annotation (小字竖排) beside the headline
    · 序号 progress row + "Interflow · 字相" footer in faint gold
  Composition-level — the REAL 字骸成形 swarm (字成人形 morph between poses)
    Cards stay script-free; do the swarm as ONE composition-level <canvas>
    behind transparent cards (same pattern as nebula-glass). Make it
    deterministic so HyperFrames' frame-exact capture reproduces it:
      • ~150 glyphs; each glyph i has a scatter home `S_i` (seeded by i, spread
        across the enso) and, per pose p, a figure anchor `A_{p,i}` (sampled
        from the pose's silhouette point cloud — head/torso/arms/legs).
      • position is a TIME-CLOSED lerp driven by the GSAP timeline onUpdate:
        `pos = lerp(S_i, A_{p,i}, easeInOut(localProgress))`; on each cut,
        retarget A from pose p → p+1 (旋风蹬腿→金鸡独立…) so the body morphs.
      • ~12% of glyphs painted seal-red, the rest sumi-ink with per-glyph alpha
        from a seeded value() (NO Math.random — use a hash of i; see
        nebula-glass header for the deterministic value()/seek rules).
      • NEVER `repeat:-1`; size finite repeats to comp duration.
    The per-card HTML below is the SCRIPT-FREE static approximation (hand-placed
    glyphs forming one pose) — clone it when you don't need the live morph.
  Best with
    layouts: stack (推荐, 竖排标题在上/人形在下也成立) · split · pip · overlay
    frames:  clean (enso + paper carry their own ornament; deco frame cheapens)
    content: 国风 / 功夫 / 书法 / 茶禅 / 文化叙事 · 招式谱式 enumerations · 反思金句
  Portrait: scale type ×1.3, shrink side padding. This ref is the landscape
            (1920×1080) baseline like its siblings.
-->
<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>style · ink-figure (字骸成形)</title>
<style>
  html, body { margin: 0; padding: 0; background: #0a0c12;
               font-family: ui-serif, "Songti SC", serif; }
  .stage { position: relative; width: 1920px; height: 1080px;
           transform-origin: top left; transform: scale(0.5); overflow: hidden; }
  .card-host { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; }
</style>
</head>
<body>
<div class="stage"><div class="card-host">

<div class="card" data-card-id="ref-ink-figure">
  <style>
    .card[data-card-id="ref-ink-figure"] { height: 100%; }
    .card[data-card-id="ref-ink-figure"] .root {
      --paper: #F0EBDF; --paper2: #E7DFCC; --ink: #2A2622; --ink-soft: #6E665B;
      --seal: #A4291F; --seal-dim: rgba(164,41,31,.45); --gold: #8C7A53;
      --font-kai: 'LXGW WenKai TC', ui-serif, "Songti SC", "STSong", "STKaiti", serif;
      --font-ui: 'Inter', ui-sans-serif, system-ui, sans-serif;
      width: 100%; height: 100%; position: relative; overflow: hidden;
      box-sizing: border-box; background: var(--paper); color: var(--ink);
      font-family: var(--font-kai);
      /* warm vignette + faint paper unevenness */
      background-image:
        radial-gradient(ellipse 60% 60% at 78% 50%, rgba(231,223,204,.55) 0%, transparent 62%),
        radial-gradient(ellipse 80% 70% at 50% 120%, rgba(42,38,34,.06) 0%, transparent 60%);
      isolation: isolate;
    }
    /* fiber grain — one faint cross-hatch */
    .card[data-card-id="ref-ink-figure"] .grain {
      position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: .06;
      background-image:
        repeating-linear-gradient(46deg,  rgba(42,38,34,.5) 0 1px, transparent 1px 7px),
        repeating-linear-gradient(-44deg, rgba(42,38,34,.4) 0 1px, transparent 1px 9px);
    }
    /* giant ghost glyph watermark */
    .card[data-card-id="ref-ink-figure"] .ghost {
      position: absolute; right: -40px; bottom: -120px; z-index: 0; pointer-events: none;
      font-family: var(--font-kai); font-size: 760px; line-height: .8;
      color: rgba(42,38,34,.05);
    }

    /* ── left column: 竖排序号 headline ── */
    .card[data-card-id="ref-ink-figure"] .colL {
      position: absolute; left: 104px; top: 132px; z-index: 2;
      display: flex; align-items: flex-start; gap: 30px;
    }
    .card[data-card-id="ref-ink-figure"] .seal {
      flex: 0 0 auto; width: 70px; height: 70px;
      background: var(--seal); color: var(--paper);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-kai); font-size: 40px;
      box-shadow: 0 6px 18px -8px rgba(164,41,31,.6);
    }
    .card[data-card-id="ref-ink-figure"] .title {
      writing-mode: vertical-rl; text-orientation: upright;
      font-family: var(--font-kai); font-size: 118px; line-height: 1.18;
      letter-spacing: .06em; color: var(--ink);
      text-shadow: 0 2px 0 rgba(42,38,34,.08);
    }
    .card[data-card-id="ref-ink-figure"] .couplet {
      writing-mode: vertical-rl; text-orientation: upright;
      font-family: var(--font-kai); font-size: 28px; line-height: 1.9;
      letter-spacing: .12em; color: var(--ink-soft); margin-top: 8px;
    }
    /* top-left brand mark */
    .card[data-card-id="ref-ink-figure"] .mark {
      position: absolute; left: 104px; top: 56px; z-index: 2;
      display: flex; align-items: center; gap: 16px;
      font-family: var(--font-ui); font-size: 19px; font-weight: 700;
      letter-spacing: .26em; text-transform: uppercase; color: var(--ink-soft);
    }
    .card[data-card-id="ref-ink-figure"] .mark b {
      width: 36px; height: 36px; background: var(--ink); color: var(--paper);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-kai); font-size: 24px; font-weight: 400;
    }

    /* ── right: enso circle + figure of glyphs ── */
    .card[data-card-id="ref-ink-figure"] .stageR {
      position: absolute; right: 150px; top: 50%; transform: translateY(-50%);
      width: 720px; height: 760px; z-index: 1;
    }
    .card[data-card-id="ref-ink-figure"] .enso {
      position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
      width: 660px; height: 660px; border-radius: 50%;
      border: 1.5px solid rgba(42,38,34,.32);
      /* brush opening — slightly broken ring */
      mask: conic-gradient(from 18deg, #000 0 312deg, transparent 322deg 360deg);
      -webkit-mask: conic-gradient(from 18deg, #000 0 312deg, transparent 322deg 360deg);
    }
    .card[data-card-id="ref-ink-figure"] .figure {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%,-50%);
      width: 380px; height: 560px;
    }
    .card[data-card-id="ref-ink-figure"] .g {
      position: absolute; font-family: var(--font-kai);
      color: var(--ink); transform: translate(-50%,-50%);
      font-size: 24px; line-height: 1; opacity: .9;
    }
    .card[data-card-id="ref-ink-figure"] .g.r { color: var(--seal); }
    .card[data-card-id="ref-ink-figure"] .g.big { font-size: 34px; opacity: 1; }
    .card[data-card-id="ref-ink-figure"] .g.sm  { font-size: 18px; opacity: .7; }

    /* ── footer: 序号 progress + meta ── */
    .card[data-card-id="ref-ink-figure"] .foot {
      position: absolute; left: 104px; right: 150px; bottom: 64px; z-index: 2;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card[data-card-id="ref-ink-figure"] .prog {
      display: flex; align-items: center; gap: 28px;
      font-family: var(--font-kai); font-size: 30px; color: rgba(42,38,34,.34);
    }
    .card[data-card-id="ref-ink-figure"] .prog .on { color: var(--seal); position: relative; }
    .card[data-card-id="ref-ink-figure"] .prog .on::after {
      content: ''; position: absolute; left: 0; right: 0; bottom: -12px; height: 3px;
      background: var(--seal); border-radius: 3px;
    }
    .card[data-card-id="ref-ink-figure"] .sig {
      font-family: var(--font-ui); font-size: 18px; letter-spacing: .22em;
      text-transform: uppercase; color: var(--gold);
    }
  </style>

  <div class="root">
    <div class="grain"></div>
    <div class="ghost" data-anim="drift" data-anim-axis="x" data-anim-amp="10" data-anim-period="13">武</div>

    <div class="mark" data-anim="fade-in" data-anim-at="0.12" data-anim-duration="0.5">
      <b>武</b> 中国功夫 · 招式谱
    </div>

    <div class="colL">
      <div class="seal" data-anim="scale-pop" data-anim-at="0.24" data-anim-duration="0.5">壹</div>
      <div>
        <div class="title" data-anim="slide-in" data-anim-from="top" data-anim-at="0.34"
             data-anim-duration="0.8" data-anim-distance="40">抱拳起势</div>
        <div class="couplet" data-anim="fade-in" data-anim-at="0.7" data-anim-duration="0.6">以礼始 · 以礼终</div>
      </div>
    </div>

    <!-- the figure: glyphs hand-placed into a standing pose. In a real comp the
         composition-level canvas morphs ~150 glyphs between poses (see header). -->
    <div class="stageR" data-anim="settle" data-anim-at="0.3" data-anim-duration="0.9">
      <div class="enso" data-anim="draw-path" data-anim-at="0.2" data-anim-duration="1.0"></div>
      <div class="figure">
        <!-- head -->
        <span class="g big" style="left:50%; top:5%;">神</span>
        <span class="g sm"  style="left:43%; top:9%;">意</span>
        <span class="g sm r" style="left:57%; top:9%;">气</span>
        <span class="g sm"  style="left:50%; top:13%;">念</span>
        <!-- shoulders -->
        <span class="g"     style="left:40%; top:20%;">形</span>
        <span class="g big" style="left:50%; top:21%;">骨</span>
        <span class="g"     style="left:60%; top:20%;">韵</span>
        <!-- left arm (shoulder → elbow → fist) -->
        <span class="g sm"  style="left:31%; top:22%;">起</span>
        <span class="g"     style="left:23%; top:26%;">臂</span>
        <span class="g sm r" style="left:16%; top:31%;">手</span>
        <span class="g sm"  style="left:11%; top:37%;">拳</span>
        <!-- right arm (shoulder → elbow → fist) -->
        <span class="g sm"  style="left:69%; top:22%;">出</span>
        <span class="g"     style="left:77%; top:26%;">招</span>
        <span class="g sm r" style="left:84%; top:31%;">式</span>
        <span class="g sm"  style="left:89%; top:37%;">劲</span>
        <!-- upper torso -->
        <span class="g"     style="left:43%; top:30%;">力</span>
        <span class="g big" style="left:51%; top:32%;">武</span>
        <span class="g"     style="left:59%; top:30%;">沉</span>
        <!-- mid torso -->
        <span class="g sm"  style="left:45%; top:40%;">气</span>
        <span class="g r"   style="left:52%; top:42%;">心</span>
        <span class="g sm"  style="left:59%; top:40%;">息</span>
        <!-- waist -->
        <span class="g sm"  style="left:48%; top:50%;">束</span>
        <span class="g sm"  style="left:54%; top:50%;">腰</span>
        <!-- hips -->
        <span class="g"     style="left:42%; top:58%;">稳</span>
        <span class="g big" style="left:51%; top:59%;">桩</span>
        <span class="g"     style="left:60%; top:58%;">定</span>
        <span class="g sm"  style="left:51%; top:64%;">根</span>
        <!-- left leg (thigh → shin → foot) -->
        <span class="g"     style="left:42%; top:70%;">步</span>
        <span class="g sm"  style="left:39%; top:79%;">行</span>
        <span class="g sm"  style="left:37%; top:88%;">沉</span>
        <span class="g sm r" style="left:36%; top:96%;">立</span>
        <!-- right leg (thigh → shin → foot) -->
        <span class="g"     style="left:60%; top:70%;">蹬</span>
        <span class="g sm"  style="left:63%; top:79%;">坠</span>
        <span class="g sm"  style="left:65%; top:88%;">地</span>
        <span class="g sm"  style="left:66%; top:96%;">实</span>
      </div>
    </div>

    <div class="foot">
      <div class="prog" data-anim="fade-in" data-anim-at="1.2" data-anim-duration="0.5">
        <span class="on">壹</span><span>贰</span><span>叁</span><span>肆</span><span>伍</span><span>陆</span>
      </div>
      <div class="sig" data-anim="fade-in" data-anim-at="1.35" data-anim-duration="0.5">Interflow · 字相</div>
    </div>
  </div>
</div>

</div></div>
</body>
</html>
